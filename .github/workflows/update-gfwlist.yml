name: Update Rules

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:  # Allow manual triggering

jobs:
  update-rules:
    runs-on: ubuntu-latest

    # Add this permissions block
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip

    - name: Run GFW list converter
      run: |
        python autoscript/gfw/gfwlist_to_quantumultx.py

    - name: Run proxy list converter
      run: |
        python autoscript/proxy/proxy_to_quantumultx.py

    - name: Run local CIDR converter
      run: |
        python autoscript/local/local_to_quantumultx.py

    - name: Check for changes
      id: git-check
      run: |
        if [[ -n $(git status --porcelain) ]]; then
          echo "Change detected"
          echo "modified=true" >> "$GITHUB_OUTPUT"
        else
          echo "No changes"
          echo "modified=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Commit and push if changed
      if: steps.git-check.outputs.modified == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -A
        git commit -m "Update GFW, proxy, and local lists for Quantumult X and Clash"
        git push
